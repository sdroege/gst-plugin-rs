[package]
name = "gst-plugin-colorlut"
version.workspace = true
authors = ["Seungha Yang <seungha@centricular.com>"]
license = "MPL-2.0"
edition.workspace = true
rust-version.workspace = true
description = "GStreamer Color LUT Plugin"
repository.workspace = true

[dependencies]
gst.workspace = true
gst-base.workspace = true
gst-video.workspace = true
byte-slice-cast = "1"
gst-d3d12.workspace = true
windows = { version = ">= 0.61, <= 0.62", features=["Win32_Graphics_Direct3D12",
    "Win32_Graphics_Direct3D11", "Win32_Graphics_Dxgi", "Win32_Graphics_Direct3D",
    "Win32_Graphics_Dxgi_Common", "Win32_Graphics_Direct3D_Fxc", "Win32_Foundation"] }

[dev-dependencies]
gst-check.workspace = true

[lib]
name = "gstcolorlut"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[build-dependencies]
gst-plugin-version-helper.workspace = true

[features]
static = []
capi = []
doc = ["gst/v1_18"]

[package.metadata.capi]
min_version = "0.9.21"

[package.metadata.capi.header]
enabled = false

[package.metadata.capi.library]
install_subdir = "gstreamer-1.0"
versioning = false
import_library = false

[package.metadata.capi.pkg_config]
requires_private = "gstreamer-1.0, gstreamer-base-1.0, gstreamer-video-1.0, gstreamer-d3d12-1.0, gobject-2.0, glib-2.0, gmodule-2.0"

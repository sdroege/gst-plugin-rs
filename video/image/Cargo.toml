[package]
name = "gst-plugin-imagers"
edition.workspace = true
version.workspace = true
repository.workspace = true
rust-version.workspace = true
authors = ["Amyspark <amy@centricular.com>"]
license = "MPL-2.0"
description = "GStreamer plugin based on image-rs"

[dependencies]
gst.workspace = true
gst-base.workspace = true
gst-tag.workspace = true
gst-video.workspace = true
anyhow = "1"
byte-slice-cast = "1.2"
futures = "0.3"
image = "0.25.10"

[dev-dependencies]
gst-check = { workspace = true, features = ["v1_16"] }
image-compare = "0.5.0"

[lib]
name = "gstimagers"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[build-dependencies]
gst-plugin-version-helper.workspace = true

[features]
default = []
static = []
capi = []
doc = []

[package.metadata.capi]
min_version = "0.9.21"

[package.metadata.capi.header]
enabled = false

[package.metadata.capi.library]
install_subdir = "gstreamer-1.0"
versioning = false
import_library = false

[package.metadata.capi.pkg_config]
requires_private = "gstreamer-1.0, gstreamer-base-1.0, gstreamer-video-1.0"

[[example]]
name = "imagersoverlay"

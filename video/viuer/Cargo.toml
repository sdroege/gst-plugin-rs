[package]
name = "gst-plugin-viuer"
version.workspace = true
authors = ["Zeeshan Ali <zeenix@gmail.com>"]
repository.workspace = true
license = "MPL-2.0"
edition.workspace = true
rust-version.workspace = true
description = "GStreamer viuer terminal video sink"

[dependencies]
gst.workspace = true
gst-base.workspace = true
gst-video.workspace = true
image = { version = "0.25", default-features = false }
viuer = { version = "0.11", default-features = false, features = ["icy_sixel"] }

[dev-dependencies]
gst-check.workspace = true

[lib]
name = "gstviuer"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[build-dependencies]
gst-plugin-version-helper.workspace = true

[features]
static = []
capi = []
doc = ["gst/v1_18"]
[package.metadata.capi]
min_version = "0.9.21"

[package.metadata.capi.header]
enabled = false

[package.metadata.capi.library]
install_subdir = "gstreamer-1.0"
versioning = false
import_library = false

[package.metadata.capi.pkg_config]
requires_private = "gstreamer-1.0, gstreamer-base-1.0, gstreamer-video-1.0, gobject-2.0, glib-2.0, gmodule-2.0"

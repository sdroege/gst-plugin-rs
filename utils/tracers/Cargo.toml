[package]
name = "gst-plugin-tracers"
version.workspace = true
authors = ["Guillaume Desmottes <guillaume.desmottes@onestream.live>"]
repository.workspace = true
license = "MPL-2.0"
edition.workspace = true
description = "GStreamer Rust tracers plugin"
rust-version.workspace = true

[dependencies]
gst.workspace = true
gst-tracing = { workspace = true, optional = true }
anyhow = "1"
regex = "1"
atomic_refcell = "0.1"
pcap-file = "2"
etherparse = "0.19.0"
chrono = "0.4.35"
walkdir = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-stream = "0.1.11"
async-tungstenite = { version = "0.33", features = ["tokio-runtime", "url"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
futures = "0.3"
tracing = { version="0.1", optional = true}
tracing-chrome = { version = "0.7", optional = true }
tracing-subscriber = { version = "0.3", features = ["json"], optional = true }
tracing-perfetto-sdk-layer = { version = "0.13", optional = true }
tracing-perfetto-sdk-schema = { version = "0.13", optional = true }
tracing-appender = { version = "0.2", optional = true }

[target.'cfg(unix)'.dependencies]
signal-hook = "0.4"

[lib]
name = "gstrstracers"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[build-dependencies]
gst-plugin-version-helper.workspace = true

[features]
default = ["gst-tracing", "tracing-chrome", "tracing-subscriber"]
static = []
capi = []
doc = ["gst/v1_18"]
v1_22 = ["gst/v1_22"]
v1_26 = ["gst/v1_26"]
gst-tracing = ["dep:gst-tracing", "dep:tracing"]
tracing-chrome = ["gst-tracing", "dep:tracing-chrome", "dep:tracing-subscriber"]
tracing-subscriber = ["gst-tracing", "dep:tracing-subscriber"]
perfetto = ["gst-tracing", "dep:tracing-perfetto-sdk-layer", "dep:tracing-perfetto-sdk-schema", "dep:tracing-appender"]

[package.metadata.capi]
min_version = "0.9.21"

[package.metadata.capi.header]
enabled = false

[package.metadata.capi.library]
install_subdir = "gstreamer-1.0"
versioning = false
import_library = false

[package.metadata.capi.pkg_config]
requires_private = "gstreamer-1.0, gobject-2.0, glib-2.0, gmodule-2.0"

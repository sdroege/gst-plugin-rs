[package]
name = "gst-plugin-hrtf"
version.workspace = true
authors = ["Tomasz Andrzejak <andreiltd@gmail.com>"]
repository.workspace = true
license = "MPL-2.0"
description = "GStreamer Rust Head Related Transform Function (HRTF) Plugin"
edition.workspace = true
rust-version.workspace = true

[dependencies]
gst = { workspace = true, features = ["v1_20"] }
gst-base = { workspace = true, features = ["v1_20"] }
gst-audio = { workspace = true, features = ["v1_16"] }
byte-slice-cast = "1.2"
hrtf = "0.8"
rayon = "1.5"
sofar = "0.3"

[lib]
name = "gsthrtf"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dev-dependencies]
gst-check = { workspace = true, features = ["v1_18"] }
gst-app.workspace = true
anyhow = "1"
clap = { version = "4", features = ["derive"] }

[build-dependencies]
gst-plugin-version-helper.workspace = true

[features]
static = []
capi = []
doc = ["gst/v1_18"]

[package.metadata.capi]
min_version = "0.9.21"

[package.metadata.capi.header]
enabled = false

[package.metadata.capi.library]
install_subdir = "gstreamer-1.0"
versioning = false

[package.metadata.capi.pkg_config]
requires_private = "gstreamer-1.0, gstreamer-base-1.0, gstreamer-audio-1.0, gobject-2.0, glib-2.0, gmodule-2.0"
